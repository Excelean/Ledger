<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Excelean Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101010;
    --card:#1A1A1A;
    --card-2:#222222;
    --line:#2E2E2E;
    --text:#F2F2F2;
    --muted:#9A9A9A;
    --brand:#FFD60A;      /* XCLN yellow */
    --brand-ink:#141400;
    --in:#4ADE80;
    --out:#F87171;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;font-size:15px;
  }
  .num, h1,h2,h3{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 90px}

  /* ---------- Login ---------- */
  #loginView{display:flex;flex-direction:column;justify-content:center;min-height:100vh;max-width:400px;margin:0 auto;padding:24px}
  .logo{font-family:'Barlow Condensed';font-weight:700;font-size:34px;text-transform:uppercase;letter-spacing:.04em}
  .logo span{color:var(--brand)}
  .logo-sub{color:var(--muted);font-size:13px;margin:6px 0 34px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
  input,select,textarea{
    width:100%;background:var(--card);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:13px 14px;font-size:16px;font-family:inherit;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--brand)}
  .btn{
    width:100%;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:600;
    cursor:pointer;font-family:'Inter';transition:transform .06s ease, filter .15s;
  }
  .btn:active{transform:scale(.985)}
  .btn-brand{background:var(--brand);color:var(--brand-ink)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .err{color:var(--out);font-size:13px;min-height:18px;margin:8px 0}

  /* ---------- Header ---------- */
  header{display:flex;align-items:center;justify-content:space-between;padding:6px 0 14px}
  header .logo{font-size:24px}
  #signOutBtn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer}

  /* ---------- Summary strip ---------- */
  .summary{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;
  }
  .summary .cell{background:var(--card);padding:14px 12px;text-align:center}
  .summary .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .summary .val{font-family:'Barlow Condensed';font-weight:700;font-size:28px;margin-top:2px}
  .val.in{color:var(--in)} .val.out{color:var(--out)} .val.net{color:var(--brand)}
  .month-label{font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em}

  /* ---------- Entry pad ---------- */
  .pad{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:20px}
  .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .type-btn{
    padding:16px;border-radius:12px;border:1px solid var(--line);background:var(--card-2);
    color:var(--muted);font-family:'Barlow Condensed';font-weight:700;font-size:20px;
    text-transform:uppercase;letter-spacing:.05em;cursor:pointer;transition:all .12s;
  }
  .type-btn.sel-in{background:rgba(74,222,128,.14);border-color:var(--in);color:var(--in)}
  .type-btn.sel-out{background:rgba(248,113,113,.14);border-color:var(--out);color:var(--out)}
  .seg{display:flex;gap:8px;margin-bottom:14px}
  .seg button{
    flex:1;padding:9px;border-radius:9px;border:1px solid var(--line);background:transparent;
    color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter'
  }
  .seg button.on{background:var(--brand);border-color:var(--brand);color:var(--brand-ink)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .chip{
    padding:8px 13px;border-radius:999px;border:1px solid var(--line);background:transparent;
    color:var(--muted);font-size:13px;cursor:pointer;font-family:'Inter'
  }
  .chip.on{border-color:var(--brand);color:var(--brand);background:rgba(255,214,10,.08)}
  .amt-row{position:relative;margin-bottom:12px}
  .amt-row .cur{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
  #amount{padding-left:56px;font-family:'Barlow Condensed';font-weight:600;font-size:26px}
  #desc{margin-bottom:14px}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--brand);color:var(--brand-ink);font-weight:600;font-size:14px;
    padding:11px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:50
  }
  .toast.show{opacity:1}

  /* ---------- List ---------- */
  .list-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .list-head h2{font-size:19px;text-transform:uppercase;font-weight:600}
  .filter{display:flex;gap:6px}
  .filter button{padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:12px;cursor:pointer}
  .filter button.on{border-color:var(--brand);color:var(--brand)}
  .tx{
    display:flex;align-items:center;gap:12px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px
  }
  .tx .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .tx .dot.in{background:var(--in)} .tx .dot.out{background:var(--out)}
  .tx .mid{flex:1;min-width:0}
  .tx .cat{font-weight:600;font-size:14px}
  .tx .meta{color:var(--muted);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .amt{font-family:'Barlow Condensed';font-weight:700;font-size:21px;white-space:nowrap}
  .tx .amt.in{color:var(--in)} .tx .amt.out{color:var(--out)}
  .biz-tag{font-size:10px;border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--muted);margin-left:6px;vertical-align:1px}
  .empty{color:var(--muted);text-align:center;padding:30px 0;font-size:14px}
  .del{background:none;border:none;color:#555;font-size:16px;cursor:pointer;padding:4px}
  #loading{text-align:center;color:var(--muted);padding:60px 0}
  .hidden{display:none!important}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginView" class="hidden">
  <div class="logo">Excelean <span>Ledger</span></div>
  <div class="logo-sub">Money in. Money out. Both of us see everything.</div>
  <div class="field"><label>Email</label><input type="email" id="email" autocomplete="username"></div>
  <div class="field"><label>Password</label><input type="password" id="password" autocomplete="current-password"></div>
  <div class="err" id="loginErr"></div>
  <button class="btn btn-brand" id="loginBtn">Sign in</button>
</div>

<!-- ================= APP ================= -->
<div id="appView" class="wrap hidden">
  <header>
    <div class="logo">Excelean <span>Ledger</span></div>
    <button id="signOutBtn">Sign out</button>
  </header>

  <div class="month-label" id="monthLabel"></div>
  <div class="summary">
    <div class="cell"><div class="lbl">In</div><div class="val in num" id="sumIn">0.00</div></div>
    <div class="cell"><div class="lbl">Out</div><div class="val out num" id="sumOut">0.00</div></div>
    <div class="cell"><div class="lbl">Net</div><div class="val net num" id="sumNet">0.00</div></div>
  </div>

  <div class="pad">
    <div class="type-toggle">
      <button class="type-btn" id="btnIn">Money In</button>
      <button class="type-btn" id="btnOut">Money Out</button>
    </div>
    <div class="seg" id="bizSeg">
      <button data-biz="Excelean" class="on">Excelean</button>
      <button data-biz="XCLN">XCLN</button>
    </div>
    <div class="chips" id="catChips"></div>
    <div class="amt-row">
      <span class="cur">BND</span>
      <input type="number" inputmode="decimal" step="0.01" min="0" id="amount" placeholder="0.00">
    </div>
    <input type="text" id="desc" placeholder="Note (optional)">
    <button class="btn btn-brand" id="saveBtn">Save transaction</button>
  </div>

  <div class="list-head">
    <h2>Recent</h2>
    <div class="filter" id="bizFilter">
      <button data-f="all" class="on">All</button>
      <button data-f="Excelean">Excelean</button>
      <button data-f="XCLN">XCLN</button>
    </div>
  </div>
  <div id="txList"><div class="empty">No transactions yet. Record your first one above.</div></div>
</div>

<div id="loading">Loading…</div>
<div class="toast" id="toast">Saved</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, query, where,
  orderBy, onSnapshot, serverTimestamp, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ========= 1. PASTE YOUR FIREBASE CONFIG HERE ========= */
const firebaseConfig = {
  apiKey: "AIzaSyDrbpruRAu5c4aH7xE3zWei5L8mHl7r0W8",
  authDomain: "excelean-ledger.firebaseapp.com",
  projectId: "excelean-ledger",
  storageBucket: "excelean-ledger.firebasestorage.app",
  messagingSenderId: "37200628307",
  appId: "1:37200628307:web:8710d93ce17d2fd39e14a6"
};

/* ========= 2. Display names for each account ========= */
const USER_NAMES = {
  "your-uid-here": "Mazlee",
  "zuraidah-uid-here": "Zuraidah"
};

/* ========= Categories (edit freely) ========= */
const CATEGORIES = {
  in:  ["Membership", "Day Pass", "PT Session", "Merch Sale", "Other In"],
  out: ["Rent", "Utilities", "Equipment", "Supplies", "XCLN Stock", "Wages", "Other Out"]
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const $ = id => document.getElementById(id);
let state = { type:null, biz:"Excelean", cat:null, filter:"all", txs:[], unsub:null };

/* ---------- Auth ---------- */
onAuthStateChanged(auth, user => {
  $("loading").classList.add("hidden");
  if (user) {
    $("loginView").classList.add("hidden");
    $("appView").classList.remove("hidden");
    startListener();
  } else {
    if (state.unsub) { state.unsub(); state.unsub = null; }
    $("appView").classList.add("hidden");
    $("loginView").classList.remove("hidden");
  }
});

$("loginBtn").onclick = async () => {
  $("loginErr").textContent = "";
  try {
    await signInWithEmailAndPassword(auth, $("email").value.trim(), $("password").value);
  } catch (e) {
    $("loginErr").textContent = "Sign-in failed. Check email and password.";
  }
};
$("password").addEventListener("keydown", e => { if (e.key === "Enter") $("loginBtn").click(); });
$("signOutBtn").onclick = () => signOut(auth);

/* ---------- Entry pad ---------- */
function setType(t){
  state.type = t; state.cat = null;
  $("btnIn").className  = "type-btn" + (t==="in"  ? " sel-in"  : "");
  $("btnOut").className = "type-btn" + (t==="out" ? " sel-out" : "");
  renderChips();
}
$("btnIn").onclick  = () => setType("in");
$("btnOut").onclick = () => setType("out");

function renderChips(){
  const box = $("catChips"); box.innerHTML = "";
  if (!state.type) return;
  CATEGORIES[state.type].forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (state.cat===c ? " on" : "");
    b.textContent = c;
    b.onclick = () => { state.cat = c; renderChips(); };
    box.appendChild(b);
  });
}

$("bizSeg").querySelectorAll("button").forEach(b => {
  b.onclick = () => {
    state.biz = b.dataset.biz;
    $("bizSeg").querySelectorAll("button").forEach(x => x.classList.toggle("on", x===b));
  };
});

$("saveBtn").onclick = async () => {
  const amt = parseFloat($("amount").value);
  if (!state.type)  return flash("Choose Money In or Money Out");
  if (!state.cat)   return flash("Choose a category");
  if (!amt || amt <= 0) return flash("Enter an amount");
  const user = auth.currentUser;
  try {
    await addDoc(collection(db, "transactions"), {
      type: state.type,
      business: state.biz,
      category: state.cat,
      amount: Math.round(amt * 100) / 100,
      description: $("desc").value.trim(),
      recordedBy: USER_NAMES[user.uid] || user.email,
      uid: user.uid,
      createdAt: serverTimestamp()
    });
    $("amount").value = ""; $("desc").value = "";
    state.cat = null; renderChips();
    flash("Saved ✓");
  } catch (e) { flash("Save failed — check connection"); }
};

let toastTimer;
function flash(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
}

/* ---------- Live data: current month ---------- */
function startListener(){
  if (state.unsub) state.unsub();
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  $("monthLabel").textContent = now.toLocaleDateString("en-GB", { month:"long", year:"numeric" });

  const q = query(
    collection(db, "transactions"),
    where("createdAt", ">=", Timestamp.fromDate(monthStart)),
    orderBy("createdAt", "desc")
  );
  state.unsub = onSnapshot(q, snap => {
    state.txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => console.error(err));
}

/* ---------- Render ---------- */
$("bizFilter").querySelectorAll("button").forEach(b => {
  b.onclick = () => {
    state.filter = b.dataset.f;
    $("bizFilter").querySelectorAll("button").forEach(x => x.classList.toggle("on", x===b));
    render();
  };
});

const fmt = n => n.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });

function render(){
  const txs = state.filter === "all" ? state.txs : state.txs.filter(t => t.business === state.filter);

  let tin = 0, tout = 0;
  txs.forEach(t => t.type === "in" ? tin += t.amount : tout += t.amount);
  $("sumIn").textContent  = fmt(tin);
  $("sumOut").textContent = fmt(tout);
  $("sumNet").textContent = (tin - tout < 0 ? "−" : "") + fmt(Math.abs(tin - tout));

  const box = $("txList"); box.innerHTML = "";
  if (!txs.length) {
    box.innerHTML = '<div class="empty">No transactions yet this month. Record your first one above.</div>';
    return;
  }
  txs.forEach(t => {
    const d = t.createdAt?.toDate ? t.createdAt.toDate() : new Date();
    const row = document.createElement("div");
    row.className = "tx";
    row.innerHTML = `
      <div class="dot ${t.type}"></div>
      <div class="mid">
        <div class="cat">${esc(t.category)}<span class="biz-tag">${esc(t.business)}</span></div>
        <div class="meta">${d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})} · ${esc(t.recordedBy||"")}${t.description ? " · " + esc(t.description) : ""}</div>
      </div>
      <div class="amt ${t.type}">${t.type==="in" ? "+" : "−"}${fmt(t.amount)}</div>
      <button class="del" title="Delete">×</button>`;
    row.querySelector(".del").onclick = async () => {
      if (confirm("Delete this transaction?")) await deleteDoc(doc(db, "transactions", t.id));
    };
    box.appendChild(row);
  });
}

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
</script>
</body>
</html>
